<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Red Team Simulator</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0B1120',
                        panel: '#1E293B',
                        panelBorder: '#334155',
                        brand: '#3B82F6',
                        success: '#10B981',
                        alert: '#EF4444',
                        warning: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0B1120; color: #CBD5E1; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748B; }

        .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); }

        .terminal-log { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen overflow-hidden antialiased flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons (using feather-icons via raw SVG for simplicity in React without bundle) ---
        const IconActivity = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>;
        const IconCheckCircle = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const IconAlertCircle = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const IconServer = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" /></svg>;
        const IconShield = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>;
        const IconPlay = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>;
        const IconPause = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>;
        
        // --- Shared Components ---
        const Panel = ({ title, icon, children, className="" }) => (
            <div className={`bg-panel border border-panelBorder rounded-xl flex flex-col overflow-hidden ${className}`}>
                <div className="bg-slate-800/50 px-4 py-3 border-b border-panelBorder flex items-center gap-2 shrink-0">
                    <span className="text-brand">{icon}</span>
                    <h2 className="text-sm font-semibold text-slate-100 uppercase tracking-wider">{title}</h2>
                </div>
                <div className="p-4 flex-grow overflow-auto relative">
                    {children}
                </div>
            </div>
        );

        const Metric = ({ label, value, subtext, colorClass="text-white" }) => (
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-lg p-3 flex flex-col justify-between h-full">
                <span className="text-xs text-slate-400 font-medium">{label}</span>
                <div className="mt-1">
                    <div className={`text-2xl font-bold font-mono ${colorClass}`}>{value}</div>
                    {subtext && <div className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider font-semibold">{subtext}</div>}
                </div>
            </div>
        );

        const ProgressBar = ({ progress, colorClass="bg-brand" }) => (
            <div className="w-full bg-slate-800 rounded-full h-2 mt-2">
                <div className={`${colorClass} h-2 rounded-full transition-all duration-500`} style={{ width: `${Math.max(0, Math.min(100, progress))}%` }}></div>
            </div>
        );

        // --- Flows ---
        const SCENARIO_FLOWS = {
            easy: [
                { id: 'storage', label: 'Scan Storage', check: k => k?.discovered_storage },
                { id: 'bucket', label: 'List Buckets', check: k => k?.found_bucket },
                { id: 'flag', label: 'Access Configs', check: k => k?.read_flag },
                { id: 'patch', label: 'Patch Policy', check: k => k?.patched_sensitive_bucket }
            ],
            medium: [
                { id: 'webapp', label: 'Discover WebApp', check: k => k?.discovered_services },
                { id: 'ssrf', label: 'Exploit SSRF', check: k => k?.detected_ssrf },
                { id: 'metadata', label: 'Metadata API', check: k => k?.enumerated_iam_role },
                { id: 'iam', label: 'Extract IAM', check: k => k?.obtained_iam_creds },
                { id: 'secrets', label: 'Steal Secrets', check: k => k?.listed_secrets || k?.retrieved_secret },
                { id: 'db', label: 'Access DB', check: k => k?.accessed_db }
            ],
            hard: [
                { id: 'repo', label: 'Discover Repo', check: k => k?.discovered_services },
                { id: 'pat', label: 'Extract PAT', check: k => k?.found_leaked_token },
                { id: 'ci', label: 'Access CI/CD', check: k => k?.got_ci_token },
                { id: 'build', label: 'Modify Pipeline', check: k => k?.modified_pipeline },
                { id: 'secrets', label: 'Admin Token', check: k => k?.got_admin_token },
                { id: 'db', label: 'Breach DB', check: k => k?.accessed_db }
            ],
            custom: [
                { id: 'agent', label: 'Agent Initialized', check: k => true },
                { id: 'action', label: 'Actions Taken', check: k => Object.keys(k || {}).length > 0 },
                { id: 'done', label: 'Simulation Complete', check: k => k?.objective_complete }
            ]
        };

        const AttackFlow = ({ task, knowledge }) => {
            const flow = SCENARIO_FLOWS[task] || SCENARIO_FLOWS['custom'];
            
            return (
                <div className="flex items-center justify-between w-full h-full px-2 lg:px-4">
                    {flow.map((node, idx) => {
                        const isCompleted = node.check(knowledge);
                        const isNext = !isCompleted && (idx === 0 || flow[idx-1].check(knowledge));
                        
                        let colorState = 'border-slate-700 bg-slate-800 text-slate-500';
                        if (isCompleted) colorState = 'border-success bg-success/10 text-success glow-green';
                        else if (isNext) colorState = 'border-brand bg-brand/10 text-brand';

                        return (
                            <div key={node.id} className="flex flex-col items-center relative flex-1">
                                <div className={`w-8 h-8 lg:w-12 lg:h-12 rounded-full border-2 flex items-center justify-center z-10 transition-colors duration-300 bg-panel ${colorState}`}>
                                    {isCompleted ? <IconCheckCircle /> : isNext ? <IconActivity /> : <div className="w-1 h-1 lg:w-2 lg:h-2 rounded-full bg-slate-600" />}
                                </div>
                                <span className={`text-[9px] lg:text-[11px] font-semibold mt-2 lg:mt-3 text-center uppercase tracking-wider ${isCompleted ? 'text-success' : isNext ? 'text-brand' : 'text-slate-500'}`}>
                                    {node.label}
                                </span>
                                
                                {idx < flow.length - 1 && (
                                    <div className={`absolute top-4 lg:top-6 left-1/2 w-full h-[2px] -z-0 transition-colors duration-500 ${isCompleted ? 'bg-success/50' : 'bg-slate-700'}`}></div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // --- Main Dashboard ---
        const Dashboard = () => {
            const [state, setState] = useState(null);
            const [taskId, setTaskId] = useState('medium');
            const [customJson, setCustomJson] = useState('{\n  "services": ["storage"]\n}');
            const [isPlaying, setIsPlaying] = useState(false);
            const logsEndRef = useRef(null);

            useEffect(() => {
                const fetchState = async () => {
                    try {
                        const res = await fetch('/api/ui-state');
                        const data = await res.json();
                        setState(data);
                    } catch (e) {
                        setState({ status: 'error' });
                    }
                };
                fetchState();
                const interval = setInterval(fetchState, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!isPlaying) return;
                const interval = setInterval(() => {
                    fetch('/api/run-step', { method: 'POST' })
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === 'done' || data.status === 'error') {
                                setIsPlaying(false);
                            }
                        })
                        .catch(() => setIsPlaying(false));
                }, 1500); // Poll agent step every 1.5s
                return () => clearInterval(interval);
            }, [isPlaying]);

            useEffect(() => {
                if (logsEndRef.current) logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [state?.sim_state?.logs?.length]);

            const handleDeploy = async () => {
                setIsPlaying(false);
                let promise;
                if (taskId === 'custom') {
                    try {
                        const parsed = JSON.parse(customJson);
                        promise = fetch('/api/deploy-custom', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ scenario: parsed })
                        });
                    } catch (e) {
                        alert("Invalid Custom JSON"); return;
                    }
                } else {
                    promise = fetch('/api/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: taskId })
                    });
                    // Fallback to core openenv API endpoint if api/reset undefined locally
                    fetch('/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: taskId })
                    }).catch(console.error);
                }
            };

            const isOnline = state?.status === 'online';
            const sim = state?.sim_state || {};
            const limits = sim.limits || { budget: 20 };
            const budgetRem = sim.budget_remaining || 0;
            const alerts = sim.alerts_triggered || 0;
            const knowledge = sim.agent_knowledge || {};
            const logs = sim.logs || [];
            
            const taskActive = state?.task || 'easy';
            const flow = SCENARIO_FLOWS[taskActive] || SCENARIO_FLOWS['custom'];
            const completedNodes = flow.filter(n => n.check(knowledge)).length;
            const successProgress = (completedNodes / flow.length) * 100;
            const stealthScore = Math.max(0, 100 - (alerts * 20));
            const efficiencyScore = Math.max(0, (budgetRem / Math.max(1, limits.budget)) * 100);

            return (
                <div className="flex flex-col h-full w-full">
                    {/* Header */}
                    <header className="bg-panel border-b border-panelBorder px-6 lg:px-8 py-4 flex items-center justify-between shrink-0 shadow-lg z-20">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-brand/10 rounded-lg"><IconShield className="text-brand"/></div>
                                <div>
                                    <h1 className="text-lg lg:text-xl font-bold tracking-tight text-white leading-none">Cloud Red Team <span className="text-brand font-normal">Arena</span></h1>
                                    <div className="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Powered by OpenEnv</div>
                                </div>
                            </div>
                            <div className={`px-3 py-1.5 rounded text-xs font-bold flex items-center gap-2 uppercase tracking-wide ${isOnline ? 'bg-success/10 text-success border border-success/20 glow-green' : 'bg-slate-800 text-slate-400 border border-slate-700'}`}>
                                <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-success animate-pulse' : 'bg-slate-500'}`}></div>
                                {isOnline ? 'SIMULATION ACTIVE' : 'OFFLINE'}
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <select 
                                className="bg-slate-900 border border-slate-700 text-sm font-medium rounded-lg px-3 py-2.5 text-slate-200 outline-none focus:border-brand transition-colors cursor-pointer"
                                value={taskId} 
                                onChange={(e) => setTaskId(e.target.value)}
                            >
                                <option value="easy">Scenario: Easy Task</option>
                                <option value="medium">Scenario: Medium Task</option>
                                <option value="hard">Scenario: Hard Task</option>
                                <option value="custom">Scenario: Custom JSON</option>
                            </select>
                            <button 
                                onClick={handleDeploy}
                                className="bg-brand hover:bg-blue-600 text-white px-5 py-2.5 rounded-lg font-semibold text-sm transition-colors flex items-center gap-2 shadow-lg shadow-brand/20 active:scale-95"
                            >
                                <IconActivity /> Deploy Mission
                            </button>
                            <button 
                                onClick={() => setIsPlaying(!isPlaying)}
                                className={`${isPlaying ? 'bg-warning hover:bg-yellow-600 outline outline-2 outline-offset-2 outline-warning/50' : 'bg-success hover:bg-emerald-600'} text-white px-5 py-2.5 rounded-lg font-semibold text-sm transition-all flex items-center gap-2 shadow-lg active:scale-95`}
                            >
                                {isPlaying ? <IconPause /> : <IconPlay />} {isPlaying ? 'PAUSE AGENT' : 'RUN AGENT'}
                            </button>
                        </div>
                    </header>

                    {/* Main Content Viewport */}
                    <div className="flex-1 overflow-hidden p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 bg-[#0B1120]">
                        
                        {/* Left Side: Dashboards & Flow */}
                        <div className="lg:col-span-7 xl:col-span-8 flex flex-col gap-6 overflow-y-auto pr-2 pb-6">
                            
                            {/* Setup panel for custom JSON if needed */}
                            {taskId === 'custom' && (
                                <Panel title="Custom Scenario Payload Configuration" icon={<IconServer />} className="shrink-0">
                                    <textarea 
                                        className="w-full h-32 bg-[#010409] border border-slate-700 rounded-lg text-xs font-mono p-4 text-slate-300 outline-none focus:border-brand focus:ring-1 focus:ring-brand shadow-inner"
                                        value={customJson}
                                        onChange={(e) => setCustomJson(e.target.value)}
                                        placeholder="Enter custom environment configuration..."
                                    />
                                </Panel>
                            )}

                            {/* Attack Flow Visualization */}
                            <Panel title="Live Extraction Chain" icon={<IconActivity />} className="shrink-0 h-40 flex items-center justify-center">
                                <AttackFlow task={taskActive} knowledge={knowledge} />
                            </Panel>

                            {/* Metrics Grid */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 shrink-0">
                                <Metric label="Task Objective" value={`${completedNodes}/${flow.length}`} subtext="Subtasks Complete" colorClass="text-white" />
                                <Metric label="Budget Remaining" value={budgetRem} subtext={`/ ${limits.budget} total budget`} colorClass={budgetRem < 5 ? 'text-warning' : 'text-white'} />
                                <Metric label="Alerts Triggered" value={alerts} subtext={alerts >= 3 ? "Containment Active" : "Undetected"} colorClass={alerts > 0 ? 'text-alert glow-red text-shadow' : 'text-success'} />
                                <Metric label="Current Step" value={state?.step || 0} subtext="Agent executions" colorClass="text-brand" />
                            </div>

                            {/* Environment State Details */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1 min-h-[300px]">
                                <Panel title="Security Posture Analytics" icon={<IconShield />}>
                                    <div className="space-y-6 pt-2">
                                        <div>
                                            <div className="flex justify-between text-sm mb-2 font-medium">
                                                <span className="text-slate-300">Stealth Effectiveness</span>
                                                <span className={stealthScore > 50 ? 'text-success' : 'text-alert'}>{stealthScore}%</span>
                                            </div>
                                            <ProgressBar progress={stealthScore} colorClass={stealthScore > 50 ? 'bg-success' : 'bg-alert'} />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm mb-2 font-medium">
                                                <span className="text-slate-300">Operational Efficiency</span>
                                                <span className="text-brand">{efficiencyScore.toFixed(0)}%</span>
                                            </div>
                                            <ProgressBar progress={efficiencyScore} colorClass="bg-brand" />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm mb-2 font-medium">
                                                <span className="text-slate-300">Objective Progress</span>
                                                <span className="text-success">{successProgress.toFixed(0)}%</span>
                                            </div>
                                            <ProgressBar progress={successProgress} colorClass="bg-success" />
                                        </div>
                                        
                                        <div className="mt-8 bg-slate-900/50 rounded-lg p-4 border border-slate-700/50 shadow-inner">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs uppercase tracking-widest text-slate-400 font-semibold">Active Privilege</span>
                                                <div className={`px-3 py-1 text-xs font-bold rounded-lg uppercase tracking-wider ${sim.access_level === 'admin' ? 'bg-alert/20 text-alert border border-alert/30 glow-red' : sim.access_level === 'user' ? 'bg-brand/20 text-brand border border-brand/30 glow-blue' : 'bg-slate-800 text-slate-500 border border-slate-700'}`}>
                                                    {sim.access_level || 'NONE'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Panel>
                                
                                <Panel title="Extracted Data Vault" icon={<IconServer />}>
                                    {Object.keys(knowledge).length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-500">
                                            <IconServer className="w-12 h-12 mb-3 opacity-20" />
                                            <p className="text-sm font-medium">No intel extracted yet.</p>
                                        </div>
                                    ) : (
                                        <pre className="font-mono text-[11px] leading-relaxed text-brand whitespace-pre-wrap word-break bg-[#010409] p-4 rounded-lg border border-slate-800 h-full overflow-auto">
                                            {JSON.stringify(knowledge, null, 2)}
                                        </pre>
                                    )}
                                </Panel>
                            </div>
                        </div>

                        {/* Right Side: Terminal Logs */}
                        <div className="lg:col-span-5 xl:col-span-4 h-full flex flex-col pb-6">
                            <Panel title="Action Trajectory System" icon={<IconServer />} className="flex-1 shadow-xl">
                                <div className="absolute inset-0 bg-[#060913] p-5 overflow-y-auto font-mono text-[13px] leading-[1.6]">
                                    {logs.length === 0 ? (
                                        <div className="text-slate-600 flex items-center gap-2 mt-2">
                                            <span className="animate-ping w-2 h-2 bg-slate-600 rounded-full inline-block"></span> 
                                            System initializing... waiting for commands.
                                        </div>
                                    ) : (
                                        <div className="space-y-1.5 pb-8">
                                            {logs.map((log, i) => {
                                                let style = "text-slate-400";
                                                let prefix = "";
                                                if (log.includes("[!]")) {
                                                    style = "text-alert font-medium bg-alert/5 px-2 py-1 rounded border-l-2 border-alert";
                                                } else if (log.includes("[-]")) {
                                                    style = "text-warning font-medium";
                                                } else if (log.includes("[+]")) {
                                                    style = "text-success font-medium";
                                                } else if (log.includes("[i]")) {
                                                    style = "text-brand";
                                                } else if (log.includes("[*]")) {
                                                    style = "text-brand/80";
                                                }
                                                return <div key={i} className={`terminal-log ${style}`}>{log}</div>;
                                            })}
                                            <div ref={logsEndRef} className="h-4" />
                                        </div>
                                    )}
                                </div>
                            </Panel>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
